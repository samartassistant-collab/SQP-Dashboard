<html lang="en">
<head>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F5F3;color:#1a1a18;font-size:14px}

/* TOPBAR */
.topbar{background:#fff;border-bottom:1px solid #e0dfd8;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;background:#E84A0C;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:18px;height:18px;fill:#fff}
.topbar-left h1{font-size:16px;font-weight:600;color:#1a1a18}
.topbar-left p{font-size:11px;color:#888780;margin-top:1px}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}
.badge-warn{background:#FAEEDA;color:#633806}
.badge-ok{background:#EAF3DE;color:#27500A}
.badge-red{background:#FCEBEB;color:#791F1F}

/* CONTROL BAR */
.ctrl-bar{background:#fff;border-bottom:1px solid #e0dfd8;padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ctrl-label{font-size:11px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.btn-group{display:flex;border:1.5px solid #e0dfd8;border-radius:8px;overflow:hidden}
.btn-group button{font-size:12px;font-weight:500;padding:5px 14px;border:none;background:#fff;color:#888780;cursor:pointer;font-family:inherit;transition:all .15s;border-right:1px solid #e0dfd8}
.btn-group button:last-child{border-right:none}
.btn-group button.active{background:#E84A0C;color:#fff}
.sep{width:1px;height:24px;background:#e0dfd8;flex-shrink:0}
.period-wrap{display:flex;gap:6px;flex-wrap:wrap}
.pbtn{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1.5px solid #e0dfd8;background:#fff;color:#888780;cursor:pointer;font-family:inherit;transition:all .15s}
.pbtn:hover{border-color:#E84A0C;color:#E84A0C}
.pbtn.active{background:#E84A0C;border-color:#E84A0C;color:#fff}
.pbtn.empty{border-style:dashed;color:#ccc;cursor:default}
.pbtn.empty:hover{border-color:#ccc;color:#ccc}

/* UPLOAD BAR */
.upload-bar{background:#F9F8F5;border-bottom:1px solid #e0dfd8;padding:8px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.upload-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;border:1.5px solid #E84A0C;background:#fff;color:#E84A0C;cursor:pointer;font-family:inherit;transition:all .15s}
.upload-btn:hover{background:#E84A0C;color:#fff}
.upload-btn svg{width:13px;height:13px}
input[type=file]{display:none}
.upload-hint{font-size:11px;color:#bbb}
.ustatus{font-size:11px;color:#888780}
.ustatus.ok{color:#3B6D11}.ustatus.err{color:#A32D2D}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:20px 24px}
.sgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:20px}
@media(max-width:1000px){.sgrid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:600px){.sgrid{grid-template-columns:repeat(2,1fr)}}
.mc{background:#fff;border:1px solid #e8e7e0;border-radius:10px;padding:12px;transition:border-color .15s}
.mc:hover{border-color:#E84A0C}
.mc .lbl{font-size:10px;color:#888780;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.mc .val{font-size:17px;font-weight:600;color:#1a1a18;line-height:1.1}
.mc .sub{font-size:10px;color:#aaa;margin-top:3px}
.mc .rt{font-size:11px;font-weight:600;margin-top:4px}
.rtg{color:#3B6D11}.rta{color:#854F0B}.rtr{color:#A32D2D}

/* CARD + TABS */
.card{background:#fff;border:1px solid #e8e7e0;border-radius:12px;margin-bottom:16px;overflow:hidden}
.tabrow{display:flex;border-bottom:1px solid #e8e7e0;padding:0 20px;overflow-x:auto}
.tab{font-size:12px;padding:9px 12px;cursor:pointer;color:#888780;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;font-family:inherit}
.tab:hover{color:#1a1a18}
.tab.active{color:#1a1a18;border-bottom-color:#E84A0C;font-weight:600}
.pview{display:none;padding:20px}
.pview.active{display:block}
.slbl{font-size:11px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}

/* TABLES */
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:10px;color:#888780;font-weight:600;text-align:left;padding:6px 10px;border-bottom:1px solid #e8e7e0;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;background:#F9F8F5}
td{padding:9px 10px;border-bottom:1px solid #f0efea;color:#1a1a18;vertical-align:middle}
tr:last-child td{border-bottom:none}
.atag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;background:#F1EFE8;color:#5F5E5A;font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.dotg{background:#639922}.dota{background:#BA7517}.dotr{background:#E24B4A}
.pw{width:100%;background:#F1EFE8;border-radius:20px;height:5px;overflow:hidden;margin-bottom:2px}
.pb{height:5px;border-radius:20px}
.pbg{background:#639922}.pba{background:#BA7517}.pbr{background:#E24B4A}
.pct{font-size:11px;color:#888780}
.kmsg{font-size:11px;color:#888780;max-width:200px}

/* ALERTS */
.alert{border-radius:8px;padding:10px 14px;font-size:12px;margin-top:12px;line-height:1.5}
.alertr{background:#FCEBEB;color:#791F1F}
.alertg{background:#EAF3DE;color:#27500A}
.alerta{background:#FAEEDA;color:#633806}
.alertb{background:#E6F1FB;color:#0C447C}

/* MISC */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
@media(max-width:600px){.two-col{grid-template-columns:1fr}}
.icard{background:#F9F8F5;border:1px solid #e8e7e0;border-radius:10px;padding:14px}
.icard .ict{font-size:12px;font-weight:600;color:#1a1a18;margin-bottom:10px}
.pl{display:flex;flex-direction:column;gap:7px}
.pi{font-size:12px;color:#5F5E5A;display:flex;align-items:center;gap:7px}
.pd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cbox{background:#fff7f0;border:1px solid #f5c4b3;border-radius:10px;padding:16px 20px;margin-top:16px}
.cbox h3{font-size:14px;font-weight:600;color:#712B13;margin-bottom:10px}
.plist{display:flex;flex-direction:column;gap:8px}
.pitem{display:flex;gap:10px;align-items:flex-start}
.pnum{width:22px;height:22px;border-radius:50%;background:#E84A0C;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ptxt{font-size:13px;color:#712B13;line-height:1.4}
.footer{text-align:center;font-size:11px;color:#aaa;padding:24px;margin-top:8px}
.chart-wrap{position:relative;width:100%;height:220px;margin-top:16px}
.nodata{text-align:center;padding:40px 20px;color:#aaa;font-size:13px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
@media(max-width:700px){.tgrid{grid-template-columns:1fr}}
.tcard{background:#F9F8F5;border:1px solid #e8e7e0;border-radius:10px;padding:14px}
.tcard h4{font-size:12px;font-weight:600;color:#1a1a18;margin-bottom:10px}
.tchart-wrap{position:relative;height:140px}

  return r>=.90?'g':r>=.70?'a':'r';
}
function ragLabel(c){return c==='g'?t().on_track:c==='a'?t().watch:t().critical;}
function dot(c){return'<span class="dot dot'+c+'"></span>';}
function prog(r,type){
  var c=rag(r,type);
  var w=type==='sga'?Math.max(2,Math.round((.30/Math.max(r,.001))*100)):Math.min(100,Math.max(2,Math.round(r*100)));
  return'<div class="pw"><div class="pb pb'+c+'" style="width:'+w+'%"></div></div><span class="pct">'+Math.round(r*100)+'%</span>';
}
function getData(){
  if(mode==='monthly'){
    var mi=parseInt(currentPeriod);
    return(monthly[2026]&&monthly[2026][mi])||null;
  }
  return quarterly[currentPeriod]||null;
}
function getPeriodLabel(){
  if(mode==='monthly'){
    var mi=parseInt(currentPeriod);
    var d=monthly[2026]&&monthly[2026][mi];
    if(d)return lang==='fr'?d.label_fr:d.label_en;
    return t().months[mi]+' 2026';
  }
  var d=quarterly[currentPeriod];
  if(d)return lang==='fr'?d.label_fr:d.label_en;
  return currentPeriod+' 2026';
}

// ── LANGUAGE ──────────────────────────────────────────────────────────────────
function setLang(l){
  lang=l;
  document.getElementById('lang-en').classList.toggle('active',l==='en');
  document.getElementById('lang-fr').classList.toggle('active',l==='fr');
  applyTranslations();
  buildPeriodRow();
  renderAll();
}
function applyTranslations(){
  var tt=t();
  document.getElementById('lbl-view').textContent=tt.view;
  document.getElementById('lbl-period').textContent=tt.period;
  document.getElementById('lbl-lang').textContent=tt.lang;
  document.getElementById('tb-monthly').textContent=tt.monthly;
  document.getElementById('tb-quarterly').textContent=tt.quarterly;
  document.getElementById('upload-btn-lbl').textContent=tt.upload;
  document.getElementById('upload-hint').textContent=tt.upload_hint;
  buildTabs();
}

// ── MODE + PERIOD ─────────────────────────────────────────────────────────────
function setMode(m){
  mode=m;
  document.getElementById('tb-monthly').classList.toggle('active',m==='monthly');
  document.getElementById('tb-quarterly').classList.toggle('active',m==='quarterly');
  currentPeriod=m==='quarterly'?'Q1':'0';
  buildPeriodRow();
  renderAll();
}

function buildPeriodRow(){
  var row=document.getElementById('period-row'); row.innerHTML='';
  if(mode==='quarterly'){
    ['Q1','Q2'].forEach(function(qk){
      var hasData=!!quarterly[qk];
      var btn=document.createElement('button');
      btn.className='pbtn'+(hasData?'':' empty')+(currentPeriod===qk?' active':'');
      btn.textContent=(lang==='fr'?'T':'')+qk+(lang==='fr'?'':'')+' 2026';
      if(lang==='fr')btn.textContent='T'+qk.replace('Q','')+' 2026';
      else btn.textContent=qk+' 2026';
      if(hasData)btn.onclick=(function(k){return function(){switchPeriod(k);};})(qk);
      row.appendChild(btn);
    });
  } else {
    var months=t().months;
    for(var i=0;i<12;i++){
      var hasData=!!(monthly[2026]&&monthly[2026][i]);
      var btn=document.createElement('button');
      btn.className='pbtn'+(hasData?'':' empty')+(currentPeriod===String(i)?' active':'');
      btn.textContent=months[i]+' 2026';
      if(hasData)(function(mi){btn.onclick=function(){switchPeriod(String(mi));};})(i);
      row.appendChild(btn);
    }
  }
}

function switchPeriod(key){
  currentPeriod=key;
  buildPeriodRow();
  renderAll();
}

function buildTabs(){
  var tt=t();
  var row=document.getElementById('tabrow'); row.innerHTML='';
  tt.tabs.forEach(function(name,i){
    var id=tt.tab_ids[i];
    var btn=document.createElement('button');
    btn.className='tab'+(currentTab===id?' active':'');
    btn.textContent=name+(id==='trends'?' 📈':'');
    btn.onclick=(function(tabId,el){return function(){switchTab(tabId,el);};})(id,btn);
    row.appendChild(btn);
  });
}

function switchTab(name,el){
  currentTab=name;
  buildTabs();
  renderTabContent();
  if(name==='pipeline') setTimeout(buildPipelineChart,50);
  if(name==='revenue')  setTimeout(buildRevenueChart,50);
  if(name==='tcv')      setTimeout(buildTCVChart,50);
  if(name==='sga')      setTimeout(buildSGAChart,50);
  if(name==='hirings')  setTimeout(buildHiringsChart,50);
  if(name==='market')   setTimeout(buildMarketChart,50);
  if(name==='cash')     setTimeout(buildDSOChart,50);
  if(name==='backlog')  setTimeout(buildBacklogChart,50);
  if(name==='trends')   setTimeout(buildTrendCharts,50);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll(){
  var d=getData();
  var lbl=getPeriodLabel();
  var tt=t();
  document.getElementById('topbar-meta').textContent=mode==='quarterly'?tt.meta_q(lbl):tt.meta_m(lbl);
  renderSummary(d);
  buildTabs();
  renderTabContent();
  updateBadges(d);
}

function updateBadges(d){
  if(!d){document.getElementById('badges').innerHTML='';return;}
  var red=0,amber=0,green=0;
  var pulses=[
    rag(d.pipeline.global.t>0?d.pipeline.global.a/d.pipeline.global.t:0,''),
    rag(d.revenue.global.t>0?d.revenue.global.a/d.revenue.global.t:0,''),
    rag(d.tcv.global.t>0?d.tcv.global.a/d.tcv.global.t:0,''),
    rag(d.sga.global.a,'sga'),
    rag(d.hirings.total.t>0?d.hirings.total.a/d.hirings.total.t:0,''),
    rag(d.market.total.t>0?d.market.total.a/d.market.total.t:0,''),
    rag(d.cash.global.dso,'dso'),
    'g'
  ];
  pulses.forEach(function(c){if(c==='r')red++;else if(c==='a')amber++;else green++;});
  var tt=t();
  document.getElementById('badges').innerHTML=
    (red?'<span class="badge badge-red">'+red+' '+tt.critical+'</span>':'')+
    (amber?'<span class="badge badge-warn">'+amber+' '+tt.watch+'</span>':'')+
    (green?'<span class="badge badge-ok">'+green+' '+tt.on_track+'</span>':'');
}

function renderSummary(d){
  var grid=document.getElementById('sgrid');
  if(!d){grid.innerHTML='<div class="nodata" style="grid-column:1/-1">'+t().no_data+'</div>';return;}
  var tt=t();
  var cards=[
    {lbl:'Pipeline',val:eur(d.pipeline.global.a),sub:tt.target+' '+eur(d.pipeline.global.t),r:d.pipeline.global.t>0?d.pipeline.global.a/d.pipeline.global.t:0,type:''},
    {lbl:'Revenue',val:eur(d.revenue.global.a),sub:tt.target+' '+eur(d.revenue.global.t),r:d.revenue.global.t>0?d.revenue.global.a/d.revenue.global.t:0,type:''},
    {lbl:'TCV',val:eur(d.tcv.global.a),sub:tt.target+' '+eur(d.tcv.global.t),r:d.tcv.global.t>0?d.tcv.global.a/d.tcv.global.t:0,type:''},
    {lbl:'SG&A',val:Math.round(d.sga.global.a*100)+'%',sub:tt.target+' <30%',r:d.sga.global.a,type:'sga'},
    {lbl:tt.tabs[5],val:d.hirings.total.a+'/'+d.hirings.total.t,sub:tt.target+' '+d.hirings.total.t,r:d.hirings.total.t>0?d.hirings.total.a/d.hirings.total.t:0,type:''},
    {lbl:lang==='fr'?'Expansion':'Market',val:eur(d.market.total.a),sub:tt.target+' '+eur(d.market.total.t),r:d.market.total.t>0?d.market.total.a/d.market.total.t:0,type:''},
    {lbl:'DSO',val:d.cash.global.dso+'d',sub:tt.dso_target,r:45/Math.max(d.cash.global.dso,1),type:'dso'},
    {lbl:'Backlog',val:eur(d.backlog.global),sub:'Africa',r:1,type:''},
  ];
  function rtc(r,tp){var c=rag(r,tp);return c==='g'?'rtg':c==='a'?'rta':'rtr';}
  function rtl(r,tp){
    if(tp==='sga')return Math.round(r*100)+'% ('+tt.target+' <30%)';
    if(tp==='dso'){var dso=d.cash.global.dso;return dso<=45?'✓ '+tt.on_track:dso<=90?'⚠ '+tt.watch:'↓ '+tt.critical;}
    var p=Math.round(r*100);return p>=90?p+'% ✓':p>=70?p+'% →':p+'% ↓';
  }
  grid.innerHTML=cards.map(function(c){return'<div class="mc"><div class="lbl">'+c.lbl+'</div><div class="val">'+c.val+'</div><div class="sub">'+c.sub+'</div><div class="rt '+rtc(c.r,c.type)+'">'+rtl(c.r,c.type)+'</div></div>';}).join('');
}

function renderTabContent(){
  var d=getData(); var lbl=getPeriodLabel(); var tt=t();
  var el=document.getElementById('tab-content');
  if(!d){el.innerHTML='<div class="pview active nodata">'+tt.no_data+'</div>';return;}
  var html='';
  switch(currentTab){
    case 'overview':   html=rOverview(d,lbl); break;
    case 'pipeline':   html=rPipeline(d,lbl); break;
    case 'revenue':    html=rRevenue(d,lbl); break;
    case 'tcv':        html=rTCV(d,lbl); break;
    case 'sga':        html=rSGA(d,lbl); break;
    case 'hirings':    html=rHirings(d,lbl); break;
    case 'market':     html=rMarket(d,lbl); break;

// ── UPLOAD ────────────────────────────────────────────────────────────────────
function handleUpload(ev){
  var file=ev.target.files[0]; if(!file)return;
  var us=document.getElementById('ustatus');
  us.className='ustatus'; us.textContent=t().loading(file.name);
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var isMonthly=wb.SheetNames.some(function(n){return/P1_Pipeline|P2_Revenue/i.test(n);});
      var isQuarterly=wb.SheetNames.some(function(n){return/2026-Q[12]/i.test(n);});
      if(isMonthly){
        var p1=wb.Sheets['P1_Pipeline'];
        var rows=p1?XLSX.utils.sheet_to_json(p1,{header:1}):[]; var mi=new Date().getMonth();
        var periodVal=rows[2]?String(Object.values(rows[2])[0]||''):'';
        var allMonths=['january','february','march','april','may','june','july','august','september','october','november','december','janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
        allMonths.forEach(function(m,idx){if(periodVal.toLowerCase().includes(m))mi=idx%12;});
        var parsed=parseMonthlyForm(wb,mi);
        if(!monthly[2026])monthly[2026]={};
        monthly[2026][mi]=parsed;
        us.className='ustatus ok'; us.textContent=t().upload_ok(parsed['label_'+lang],file.name);
        if(mode!=='monthly')setMode('monthly'); else{buildPeriodRow();switchPeriod(String(mi));}
      } else if(isQuarterly){
        var qsheet=null,qname=null;
        wb.SheetNames.forEach(function(n){if(/2026-Q[12]/i.test(n)){qsheet=wb.Sheets[n];qname=n;}});
        if(!qsheet)throw new Error('Quarter sheet not found');
        var q=qname.includes('Q2')?'Q2':'Q1';
        quarterly[q]=parseQuarterlySheet(qsheet,q,wb);
        us.className='ustatus ok'; us.textContent=t().upload_ok(q+' 2026',file.name);
        if(mode!=='quarterly')setMode('quarterly'); else{buildPeriodRow();switchPeriod(q);}
      } else {throw new Error('Unrecognised file format.');}
    }catch(err){us.className='ustatus err';us.textContent=t().upload_err(err.message);}
    ev.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

function safeN(v){return(v!==null&&v!==undefined&&!isNaN(Number(v)))?Number(v):0;}
function sheetRows(ws){if(!ws)return[];var r=XLSX.utils.decode_range(ws['!ref']||'A1:K50');var rows=[];for(var ri=r.s.r;ri<=r.e.r;ri++){var row=[];for(var ci=r.s.c;ci<=r.e.c;ci++){var cell=ws[XLSX.utils.encode_cell({r:ri,c:ci})];row.push(cell?cell.v:null);}rows.push(row);}return rows;}
function findArea(rows,name){for(var i=0;i<rows.length;i++)for(var j=0;j<rows[i].length;j++)if(rows[i][j]&&String(rows[i][j]).toLowerCase().includes(name.toLowerCase()))return rows[i];return null;}
function parseArea(rows,name,tc,ac){var r=findArea(rows,name)||[];return{t:safeN(r[tc])||0,a:safeN(r[ac])||0};}

function parseMonthlyForm(wb,mi){
  var months_en=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var months_fr=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var p1=sheetRows(wb.Sheets['P1_Pipeline']);
  var p2=sheetRows(wb.Sheets['P2_Revenue']);
  var p3=sheetRows(wb.Sheets['P3_TCV']);
  var p4=sheetRows(wb.Sheets['P4_SGA']);
  var p5=sheetRows(wb.Sheets['P5_Hirings']);
  var p6=sheetRows(wb.Sheets['P6_MarketExp']);
  var p7=sheetRows(wb.Sheets['P7_Cash']);
  var p8=sheetRows(wb.Sheets['P8_Backlog']);

  var pip={ci:parseArea(p1,'CI',3,4),cam:parseArea(p1,'CAM',3,4),egypt:parseArea(p1,'Egypt',3,4),uae:parseArea(p1,'UAE',3,4),global:{t:0,a:0}};
  ['ci','cam','egypt','uae'].forEach(function(k){pip.global.t+=pip[k].t;pip.global.a+=pip[k].a;});

  var rev={ci:{t:safeN((findArea(p2,'CI')||[])[3]),a:safeN((findArea(p2,'CI')||[])[4]),bl:safeN((findArea(p2,'CI')||[])[5])},cam:{t:safeN((findArea(p2,'CAM')||[])[3]),a:safeN((findArea(p2,'CAM')||[])[4]),bl:safeN((findArea(p2,'CAM')||[])[5])},egypt:{t:safeN((findArea(p2,'Egypt')||[])[3]),a:safeN((findArea(p2,'Egypt')||[])[4]),bl:safeN((findArea(p2,'Egypt')||[])[5])},uae:{t:0,a:0,bl:0},global:{t:0,a:0,bl:0}};
  ['ci','cam','egypt'].forEach(function(k){rev.global.t+=rev[k].t;rev.global.a+=rev[k].a;rev.global.bl+=rev[k].bl;});

  var tcv={ci:parseArea(p3,'CI',3,4),cam:parseArea(p3,'CAM',3,4),egypt:parseArea(p3,'Egypt',3,4),uae:parseArea(p3,'UAE',3,4),global:{t:0,a:0}};
  ['ci','cam','egypt','uae'].forEach(function(k){tcv.global.t+=tcv[k].t;tcv.global.a+=tcv[k].a;});

  function sgaArea(rows,name){var r=findArea(rows,name)||[];var cost=safeN(r[5]);var rev2=safeN(r[6]);return{t:.30,a:rev2>0?cost/rev2:0};}
  var sga={ci:sgaArea(p4,'CI'),cam:sgaArea(p4,'CAM'),egypt:sgaArea(p4,'Egypt'),uae:sgaArea(p4,'UAE'),global:{t:.30,a:0}};
  var tc=0,tr=0;['CI','CAM','Egypt','UAE'].forEach(function(n){var r=findArea(p4,n)||[];tc+=safeN(r[5]);tr+=safeN(r[6]);});
  sga.global.a=tr>0?tc/tr:0;

  var hi={internal:{t:safeN((findArea(p5,'Internal')||[])[3])||3,a:safeN((findArea(p5,'Internal')||[])[4])},outsourcing:{t:safeN((findArea(p5,'Outsourcing')||[])[3])||3,a:safeN((findArea(p5,'Outsourcing')||[])[4])},total:{t:0,a:0}};
  hi.total.t=hi.internal.t+hi.outsourcing.t; hi.total.a=hi.internal.a+hi.outsourcing.a;

  var mkt={africa:{t:safeN((findArea(p6,'Africa')||[])[3])||100000,a:safeN((findArea(p6,'Africa')||[])[4])},me:{t:safeN((findArea(p6,'Middle East')||[])[3])||66667,a:safeN((findArea(p6,'Middle East')||[])[4])},total:{t:0,a:0}};
  mkt.total.t=mkt.africa.t+mkt.me.t; mkt.total.a=mkt.africa.a+mkt.me.a;

  function cashArea(rows,name){var r=findArea(rows,name)||[];return{dso:safeN(r[7])||0,ov90:safeN(r[4])||0,top5:safeN(r[6])||0,dues:safeN(r[8])||0};}
  var cash={ci:cashArea(p7,'CI'),cam:cashArea(p7,'CAM'),egypt:cashArea(p7,'Egypt'),global:{dso:0,dues:0}};
  cash.global.dso=Math.round((cash.ci.dso+cash.cam.dso+cash.egypt.dso)/3);
  cash.global.dues=cash.ci.dues+cash.cam.dues+cash.egypt.dues;

  var blCI=safeN((findArea(p8,'CI')||[])[6]),blCAM=safeN((findArea(p8,'CAM')||[])[6]),blEG=safeN((findArea(p8,'Egypt')||[])[6]);
  var bl={ci:blCI,cam:blCAM,egypt:blEG,uae:0,me:0,global:blCI+blCAM+blEG};

  return{label_en:months_en[mi]+' 2026',label_fr:months_fr[mi]+' 2026',source:'excel-upload',pipeline:pip,revenue:rev,tcv:tcv,sga:sga,hirings:hi,market:mkt,cash:cash,backlog:bl};
}
